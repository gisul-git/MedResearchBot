name: Build and deploy ASP app to Azure Web App - medresearchninja

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DFA7EDCA87B34C30A3F5A810828F9AAC }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2AA4741E2945421FB24AD0161FDE1871 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4DAFE6F43D5242D5B906F0C4FCB51BDE }}

      - name: Prepare deployment folder
        shell: pwsh
        run: |
          Write-Host "Copying files to temp folder..."
          New-Item -ItemType Directory -Path "temp_deploy" -Force | Out-Null
          Copy-Item -Path "medresearchninja.org-code\*" -Destination "temp_deploy\" -Recurse -Force
          
          Write-Host "Removing large and unnecessary folders..."
          $removeFolders = @(
            "Bin",
            "UploadImages",
            "wwwroot",
            ".vs",
            "obj"
          )
          foreach ($folder in $removeFolders) {
            $path = "temp_deploy\$folder"
            if (Test-Path $path) {
              Remove-Item $path -Recurse -Force
              Write-Host "Removed: $folder"
            } else {
              Write-Host "Not found (skipped): $folder"
            }
          }
          
          Write-Host "Removing large file types..."
          Get-ChildItem "temp_deploy" -Recurse -Include "*.pdb","*.suo" | Remove-Item -Force -ErrorAction SilentlyContinue
          
          $remaining = (Get-ChildItem "temp_deploy" -Recurse -File | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "Size after cleanup: $([math]::Round($remaining, 0)) MB"

      - name: Create ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "temp_deploy\*" -DestinationPath "website.zip" -CompressionLevel Fastest -Force
          $zipSize = (Get-Item "website.zip").Length / 1MB
          Write-Host "ZIP size: $([math]::Round($zipSize, 0)) MB"

      - name: Deploy via Azure CLI
        shell: pwsh
        run: |
          Write-Host "Starting deployment..."
          az webapp deploy `
            --resource-group MedResearchNinja `
            --name medresearchninja `
            --src-path website.zip `
            --type zip `
            --timeout 600

      - name: Cleanup temp files
        shell: pwsh
        if: always()
        run: |
          Remove-Item "temp_deploy" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "website.zip" -Force -ErrorAction SilentlyContinue
          Write-Host "Cleanup complete"
