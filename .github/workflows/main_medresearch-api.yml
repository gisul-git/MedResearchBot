name: Build and deploy Python app to Azure Web App - medresearch-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create and install dependencies
        working-directory: medresearch-ai-service
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            medresearch-ai-service/
            !medresearch-ai-service/antenv/
            !medresearch-ai-service/venv311/
            !medresearch-ai-service/.venv/
            !medresearch-ai-service/chroma_db/
            !medresearch-ai-service/.env

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_389B5937728F43BC96E29D68A298E19B }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3A14DEF6B19E4F4BBF827ACAB61510BF }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D9F90541E73F410BA34E302D406F213C }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'medresearch-api'
          slot-name: 'Production'

